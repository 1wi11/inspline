AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: InSpline - Serverless Event-driven Notification Pipeline

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 128
    Architectures:
      - x86_64
    Environment:
      Variables:
        EVENTS_TABLE_NAME: !Ref EventsTable
        NOTIFICATIONS_TABLE_NAME: !Ref NotificationsTable
        TOPIC_ARN: !Ref NotificationTopic
        QUEUE_URL: !Ref NotificationQueue
        MESSAGE_QUEUE_PROVIDER: sns
        NOTIFICATION_EMAIL_PROVIDER: mock
        NOTIFICATION_SMS_PROVIDER: mock
        NOTIFICATION_WEBHOOK_PROVIDER: mock
        WEBHOOK_URL: https://example.com/webhook
        NODE_OPTIONS: --enable-source-maps

Resources:
  # --- API ---
  PostEventFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/postEvent.handler
      CodeUri: ./
      Events:
        PostEvent:
          Type: Api
          Properties:
            Path: /events
            Method: post
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref NotificationsTable
        - SNSPublishMessagePolicy:
            TopicArn: !Ref NotificationTopic
            TopicName: !GetAtt NotificationTopic.TopicName
        - SQSSendMessagePolicy:
            QueueName: !GetAtt NotificationQueue.QueueName
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - src/handlers/postEvent.ts

  # --- Consumer ---
  ProcessNotificationFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/processNotification.handler
      CodeUri: ./
      Events:
        SNSTrigger:
          Type: SNS
          Properties:
            Topic: !Ref NotificationTopic
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref NotificationsTable
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - src/handlers/processNotification.ts

  GetEventFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/getEvent.handler
      CodeUri: ./
      Events:
        GetEvent:
          Type: Api
          Properties:
            Path: /events/{event_id}
            Method: get
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref NotificationsTable
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - src/handlers/getEvent.ts

  ListEventsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/handlers/listEvents.handler
      CodeUri: ./
      Events:
        ListEvents:
          Type: Api
          Properties:
            Path: /events
            Method: get
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EventsTable
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Target: es2022
        Sourcemap: true
        EntryPoints:
          - src/handlers/listEvents.ts

  # --- Database ---
  EventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: inspline-events
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: event_id
          AttributeType: S
        - AttributeName: clinic_id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: event_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: clinic_id-status-index
          KeySchema:
            - AttributeName: clinic_id
              KeyType: HASH
            - AttributeName: status
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  NotificationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: inspline-notifications
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: event_id
          AttributeType: S
        - AttributeName: channel
          AttributeType: S
      KeySchema:
        - AttributeName: event_id
          KeyType: HASH
        - AttributeName: channel
          KeyType: RANGE

  # --- Messaging ---
  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: inspline-notifications

  NotificationQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: inspline-notifications
      VisibilityTimeout: 60

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/
